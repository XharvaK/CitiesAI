<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CitiesAI HUD</title>
  <link rel="stylesheet" href="/static/app.css" />
  <style>
    body {
      margin: 0;
      background: var(--paper);
      color: var(--body);
      font-family: var(--font);
    }
    body.hud-overlay {
      background: color-mix(in srgb, var(--paper) 88%, transparent);
    }
    .hud {
      padding: 8px 10px 6px;
      min-width: 0;
    }
    .hud-head {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 6px;
      min-width: 0;
    }
    body.hud-overlay .hud-head {
      -webkit-app-region: drag;
      app-region: drag;
      cursor: default;
    }
    .hud-title {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }
    .hud-stale-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--ok);
      flex-shrink: 0;
    }
    .hud-stale-dot.stale { background: var(--warn); }
    .hud-close {
      -webkit-app-region: no-drag;
      app-region: no-drag;
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      padding: 0;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
    }
    .hud-close:hover {
      color: var(--ink);
      background: color-mix(in srgb, var(--ink) 8%, transparent);
    }
    .hud-metrics {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.35rem 0.45rem;
      font-size: 12px;
      line-height: 1.25;
      -webkit-app-region: no-drag;
      app-region: no-drag;
    }
    .hud-metric {
      display: inline-flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.25rem;
      min-width: 0;
    }
    .hud-metric-value {
      font-weight: 600;
      color: var(--ink);
      font-size: 13px;
    }
    .hud-hourly {
      font-size: 10px;
      color: var(--muted);
    }
    .hud-hourly.up { color: var(--ok); }
    .hud-hourly.down { color: var(--bad); }
    .hud-sep {
      color: var(--muted);
      opacity: 0.55;
      user-select: none;
    }
    .hud-grade-lg .grade-badge {
      width: 1.75rem;
      height: 1.75rem;
      font-size: 0.78rem;
    }
    .hud-alert {
      margin-top: 6px;
      font-size: 10px;
      color: var(--warn);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-height: 13px;
      -webkit-app-region: no-drag;
      app-region: no-drag;
    }
    .hud-alert.severity-error { color: var(--bad); }
    .hud-footer {
      margin-top: 4px;
      font-size: 9px;
      color: var(--muted);
      text-align: right;
      -webkit-app-region: no-drag;
      app-region: no-drag;
    }
  </style>
</head>
<body>
  <div class="hud">
    <div class="hud-head">
      <div class="hud-title" id="hud-city">CitiesAI HUD</div>
      <span class="hud-stale-dot" id="hud-stale-dot" title="Export freshness"></span>
      <button type="button" class="hud-close" id="hud-close" hidden aria-label="Close HUD" title="Close">×</button>
    </div>
    <div class="hud-metrics">
      <span class="hud-metric">
        <span class="hud-metric-value" id="hud-treasury">—</span>
        <span class="hud-hourly" id="hud-treasury-hr"></span>
      </span>
      <span class="hud-sep" aria-hidden="true">·</span>
      <span class="hud-metric">
        <span class="hud-metric-value" id="hud-pop">—</span>
        <span class="hud-hourly" id="hud-pop-hr"></span>
      </span>
      <span class="hud-sep" aria-hidden="true">·</span>
      <span class="hud-grade-lg" id="hud-grade">—</span>
    </div>
    <div class="hud-alert" id="hud-alert"></div>
    <div class="hud-footer" id="hud-footer">Fresh</div>
  </div>
  <script>
    const POLL_MS = 5000;

    const isOverlay = new URLSearchParams(location.search).get("overlay") === "1";
    if (isOverlay) {
      document.body.classList.add("hud-overlay");
      const closeBtn = document.getElementById("hud-close");
      if (closeBtn) closeBtn.hidden = false;
    }

    document.getElementById("hud-close")?.addEventListener("click", async () => {
      if (window.pywebview?.api?.close_hud) {
        try {
          await window.pywebview.api.close_hud();
        } catch { /* ignore */ }
        return;
      }
      window.close();
    });

    function fmtCompact(n) {
      if (n == null || Number.isNaN(n)) return "—";
      const abs = Math.abs(Number(n));
      if (abs >= 1_000_000) return `${(Number(n) / 1_000_000).toFixed(1)}M`;
      if (abs >= 10_000) return `${Math.round(Number(n) / 1000)}k`;
      return Math.round(Number(n)).toLocaleString();
    }

    function fmtHourly(value, { currency = false } = {}) {
      if (value == null || Number.isNaN(value)) return { text: "", cls: "" };
      const rounded = Math.round(Number(value));
      if (rounded === 0) return { text: "", cls: "" };
      const body = fmtCompact(Math.abs(rounded));
      const sign = rounded > 0 ? "+" : "-";
      const prefix = currency ? `${sign}¢` : sign;
      return { text: `${prefix}${body}/h`, cls: rounded > 0 ? "up" : "down" };
    }

    function gradeClass(grade) {
      const safe = String(grade || "NA").replace(/[^A-Za-z0-9/-]/g, "");
      if (safe === "NA" || safe === "N/A") return "grade-NA";
      return `grade-${safe}`;
    }

    function renderGradeBadge(grade) {
      const label = String(grade || "—");
      return `<span class="grade-badge ${gradeClass(label)}" aria-label="Grade ${label}">${label}</span>`;
    }

    function freshnessLabel(meta) {
      if (!meta) return "Fresh";
      const age = meta.age_seconds;
      if (age == null) return "Fresh";
      if (meta.stale) {
        const hours = Math.max(1, Math.round(age / 3600));
        return `Stale ${hours}h`;
      }
      if (age < 60) return "Fresh";
      const mins = Math.round(age / 60);
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      return `${hours}h ago`;
    }

    function applyHourly(el, hourly) {
      el.textContent = hourly.text;
      el.className = `hud-hourly ${hourly.cls}`.trim();
    }

    async function refresh() {
      try {
        const res = await fetch("/api/hud");
        const data = await res.json();
        if (!data.ok) return;
        const m = data.metrics || {};
        const meta = data.meta || {};
        document.getElementById("hud-city").textContent = m.city_name || "Your city";
        document.getElementById("hud-treasury").textContent =
          m.treasury == null ? "—" : `¢${fmtCompact(m.treasury)}`;
        document.getElementById("hud-pop").textContent = fmtCompact(m.population);

        applyHourly(
          document.getElementById("hud-treasury-hr"),
          fmtHourly(m.treasury_net_per_hour, { currency: true })
        );
        applyHourly(
          document.getElementById("hud-pop-hr"),
          fmtHourly(m.population_change_per_hour)
        );

        const grade = data.report_card?.overall_grade;
        document.getElementById("hud-grade").innerHTML = grade ? renderGradeBadge(grade) : "—";

        const priority = data.top_priority;
        const alertEl = document.getElementById("hud-alert");
        if (priority?.title) {
          alertEl.textContent = priority.title;
          alertEl.className = `hud-alert severity-${priority.severity || "warn"}`;
        } else {
          alertEl.textContent = "";
          alertEl.className = "hud-alert";
        }

        const staleDot = document.getElementById("hud-stale-dot");
        staleDot.classList.toggle("stale", Boolean(meta.stale));
        staleDot.title = meta.stale ? "Export is stale" : "Export is fresh";
        document.getElementById("hud-footer").textContent = freshnessLabel(meta);
      } catch { /* ignore */ }
    }
    refresh();
    setInterval(refresh, POLL_MS);
  </script>
</body>
</html>
